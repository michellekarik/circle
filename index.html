<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BMSCE Match</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #0a0a0a;
  color: white;
  text-align: center;
}

button {
  padding: 12px;
  margin: 10px;
  background: crimson;
  border: none;
  color: white;
  cursor: pointer;
}

input {
  padding: 10px;
  width: 80%;
  margin: 5px;
}

.hidden { display: none; }

.card {
  background: #111;
  padding: 20px;
  margin: 20px;
  border-radius: 10px;
}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="login">
  <h2>BMSCE Match 💋</h2>
  <button id="loginBtn">Login with Google</button>
</div>

<!-- PROFILE -->
<div id="profile" class="hidden">
  <h3>Create Profile</h3>
  <input id="name" placeholder="Name"><br>
  <input id="interests" placeholder="Interests (comma separated)"><br>
  <input id="bio" placeholder="Bio"><br>
  <button id="save">Save</button>
</div>

<!-- APP -->
<div id="app" class="hidden">
  <div id="card"></div>
  <button id="like">❤️</button>
  <button id="dislike">❌</button>
  <h3>Your Matches</h3>
  <div id="matches"></div>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
import { getAuth, GoogleAuthProvider, signInWithPopup, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
import { getFirestore, doc, setDoc, getDoc, collection, getDocs, updateDoc, arrayUnion } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "YOUR_API_KEY",
  authDomain: "bms-circle.firebaseapp.com",
  projectId: "bms-circle"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth();
const db = getFirestore();

const provider = new GoogleAuthProvider();

let user, profiles = [], index = 0;

/* LOGIN */
document.getElementById("loginBtn").onclick = async () => {
  const res = await signInWithPopup(auth, provider);

  if (!res.user.email.endsWith("@bmsce.ac.in")) {
    alert("Use BMSCE email");
    return;
  }
};

/* AUTH */
onAuthStateChanged(auth, async (u) => {
  if (!u) return;

  user = u;
  document.getElementById("login").classList.add("hidden");

  const docSnap = await getDoc(doc(db, "users", user.uid));

  if (!docSnap.exists()) {
    document.getElementById("profile").classList.remove("hidden");
  } else {
    startApp();
  }
});

/* SAVE PROFILE */
document.getElementById("save").onclick = async () => {
  const name = document.getElementById("name").value;
  const interests = document.getElementById("interests").value.split(",");
  const bio = document.getElementById("bio").value;

  await setDoc(doc(db, "users", user.uid), {
    name,
    interests,
    bio,
    likes: [],
    matches: []
  });

  document.getElementById("profile").classList.add("hidden");
  startApp();
};

/* START APP */
async function startApp() {
  document.getElementById("app").classList.remove("hidden");

  const snap = await getDocs(collection(db, "users"));
  profiles = [];

  snap.forEach(d => {
    if (d.id !== user.uid) profiles.push({ id: d.id, ...d.data() });
  });

  sortProfiles();
  showCard();
  loadMatches();
}

/* INTEREST MATCHING */
function sortProfiles() {
  profiles.sort((a, b) => {
    const scoreA = common(a.interests);
    const scoreB = common(b.interests);
    return scoreB - scoreA + Math.random();
  });
}

function common(interests) {
  const my = document.getElementById("interests").value.split(",");
  return interests.filter(i => my.includes(i)).length;
}

/* CARD */
function showCard() {
  if (index >= profiles.length) {
    document.getElementById("card").innerHTML = "No more people 😭";
    return;
  }

  const p = profiles[index];

  document.getElementById("card").innerHTML = `
    <div class="card">
      <h3>${p.name}</h3>
      <p>${p.bio}</p>
      <p><b>Interests:</b> ${p.interests.join(", ")}</p>
    </div>
  `;
}

/* LIKE */
document.getElementById("like").onclick = async () => {
  const target = profiles[index];

  const myRef = doc(db, "users", user.uid);
  await updateDoc(myRef, {
    likes: arrayUnion(target.id)
  });

  const targetDoc = await getDoc(doc(db, "users", target.id));

  if (targetDoc.data().likes.includes(user.uid)) {
    alert("💘 MATCH!");

    await updateDoc(myRef, {
      matches: arrayUnion(target.id)
    });

    await updateDoc(doc(db, "users", target.id), {
      matches: arrayUnion(user.uid)
    });

    loadMatches();
  }

  index++;
  showCard();
};

/* DISLIKE */
document.getElementById("dislike").onclick = () => {
  index++;
  showCard();
};

/* LOAD MATCHES */
async function loadMatches() {
  const docSnap = await getDoc(doc(db, "users", user.uid));
  const matches = docSnap.data().matches || [];

  let html = "";

  for (let id of matches) {
    const m = await getDoc(doc(db, "users", id));
    html += `<p>💘 ${m.data().name}</p>`;
  }

  document.getElementById("matches").innerHTML = html;
}

</script>
</body>
</html>
