<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BMS Match 🩸</title>

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600&display=swap" rel="stylesheet">

<style>
body {
  margin:0;
  font-family:Montserrat;
  background:#0b0b0f;
  color:#fff;
}

/* Modal */
.modal {
  position:fixed;
  inset:0;
  background:#000000e6;
  display:flex;
  justify-content:center;
  align-items:center;
  z-index:1000;
}

.modal-card {
  background:#15151c;
  padding:20px;
  width:90%;
  max-width:400px;
  max-height:90vh;
  overflow-y:auto;
  border-radius:10px;
}

button {
  width:100%;
  padding:12px;
  margin-top:10px;
  border:none;
  background:#ff0033;
  color:white;
  cursor:pointer;
}

input,textarea {
  width:100%;
  padding:10px;
  margin-top:10px;
  background:#1e1e2a;
  border:none;
  color:white;
}

/* App */
.container { padding:20px; }

.card {
  background:#1a1a25;
  padding:15px;
  border-radius:10px;
  margin-bottom:20px;
}

.actions button {
  width:45%;
}

.hidden { display:none; }
</style>
</head>

<body>

<!-- LOGIN -->
<div id="loginModal" class="modal">
  <div class="modal-card">
    <h2>BMS Match 🩸</h2>
    <p>Only @bmsce.ac.in allowed</p>
    <button id="loginBtn">Sign in with Google</button>
  </div>
</div>

<!-- PROFILE -->
<div id="profileModal" class="modal hidden">
  <div class="modal-card">
    <h3>Create Profile</h3>
    <input id="name" placeholder="Name">
    <textarea id="bio" placeholder="Bio"></textarea>
    <input id="insta" placeholder="Instagram">
    <button id="saveProfile">Save</button>
  </div>
</div>

<!-- APP -->
<div id="app" class="container hidden">
  <h2 id="userEmail"></h2>

  <div id="card"></div>

  <div class="actions">
    <button id="like">❤️ Like</button>
    <button id="skip">❌ Skip</button>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
import { getAuth, GoogleAuthProvider, signInWithPopup, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
import { getFirestore, doc, setDoc, getDoc, collection, getDocs } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "YOUR_KEY",
  authDomain: "bms-circle.firebaseapp.com",
  projectId: "bms-circle",
};

const app = initializeApp(firebaseConfig);
const auth = getAuth();
const db = getFirestore();

const provider = new GoogleAuthProvider();
provider.setCustomParameters({ prompt: "select_account" });

const loginModal = document.getElementById("loginModal");
const profileModal = document.getElementById("profileModal");
const appDiv = document.getElementById("app");

let user, profiles=[], index=0;

document.getElementById("loginBtn").onclick = async () => {
  try {
    const res = await signInWithPopup(auth, provider);
    if(!res.user.email.endsWith("@bmsce.ac.in")){
      alert("Only BMSCE allowed");
      return;
    }
  } catch(e){
    alert(e.message);
  }
};

onAuthStateChanged(auth, async (u)=>{
  if(!u) return;
  user=u;

  document.getElementById("userEmail").innerText=u.email;

  loginModal.classList.add("hidden");

  const docSnap = await getDoc(doc(db,"profiles",u.uid));

  if(!docSnap.exists()){
    profileModal.classList.remove("hidden");
  } else {
    startApp();
  }
});

document.getElementById("saveProfile").onclick = async ()=>{
  const name = document.getElementById("name").value;
  const bio = document.getElementById("bio").value;

  await setDoc(doc(db,"profiles",user.uid),{
    name,bio
  });

  profileModal.classList.add("hidden");
  startApp();
};

async function startApp(){
  appDiv.classList.remove("hidden");

  const snap = await getDocs(collection(db,"profiles"));
  profiles = snap.docs.map(d=>({id:d.id,...d.data()})).filter(p=>p.id!==user.uid);

  showCard();
}

function showCard(){
  if(index>=profiles.length){
    document.getElementById("card").innerHTML="No more users";
    return;
  }

  const p = profiles[index];
  document.getElementById("card").innerHTML=`
    <div class="card">
      <h3>${p.name}</h3>
      <p>${p.bio}</p>
    </div>
  `;
}

document.getElementById("like").onclick=()=>{ index++; showCard(); };
document.getElementById("skip").onclick=()=>{ index++; showCard(); };
</script>

</body>
</html>
